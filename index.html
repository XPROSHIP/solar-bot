        <style>
            :root {
                --bg-base: #0a0f1a;
                --bg-surface: #121a28;
                --bg-input: #1a2538;
                --text-main: #e2e8f0;
                --text-muted: #64748b;
                --primary: #00f0ff;
                --secondary: #ff007f;
                --success: #10b981;
                --danger: #ef4444;
                --warning: #f59e0b;
                --info: #8b5cf6;
                --google: #fbbc05; 
                --border-solid: #1e293b;
                --border: rgba(0, 240, 255, 0.2);
                --glow-primary: 0 0 15px rgba(0, 240, 255, 0.4);
                --glow-secondary: 0 0 15px rgba(255, 0, 127, 0.4);
                --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }

            * {
                box-sizing: border-box;
                -webkit-tap-highlight-color: transparent;
                margin: 0;
                padding: 0;
            }

            html, body {
                height: 100%;
                width: 100%;
                overflow: hidden;
                font-family: 'Inter', sans-serif;
                background-color: var(--bg-base);
                background-image: linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
                background-size: 30px 30px;
                color: var(--text-main);
                display: flex;
                justify-content: center;
                user-select: none;
            }
            input, textarea, .selectable { user-select: auto; }

            ::-webkit-scrollbar { width: 6px; }
            ::-webkit-scrollbar-track { background: var(--bg-base); }
            ::-webkit-scrollbar-thumb { background: var(--border-solid); border-radius: 10px; }
            ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

            .app-wrapper {
                width: 100%;
                max-width: 1200px;
                height: 100%;
                display: flex;
                flex-direction: column;
                background-color: rgba(10, 15, 26, 0.95);
                backdrop-filter: blur(10px);
                box-shadow: 0 0 50px rgba(0,0,0,1);
                border-left: 1px solid var(--border-solid);
                border-right: 1px solid var(--border-solid);
                position: relative;
            }

            .font-bangers { font-family: 'Bangers', cursive; letter-spacing: 1.5px; }
            .font-kite { font-family: 'Kite One', sans-serif; }

            .header {
                padding: 15px 20px;
                display: flex;
                align-items: center;
                gap: 15px;
                background: rgba(18, 26, 40, 0.95);
                backdrop-filter: blur(15px);
                border-bottom: 1px solid var(--border-solid);
                z-index: 100;
                flex-shrink: 0;
            }
            .header-logo {
                width: 50px; height: 50px;
                cursor: pointer; object-fit: contain;
                filter: drop-shadow(var(--glow-primary));
                transition: transform 0.2s;
            }
            .header-logo:hover { transform: scale(1.1); }
            .header-title-box { display: flex; flex-direction: column; justify-content: center; flex: 1; cursor: pointer; }
            .dynamic-title { font-size: 26px; color: var(--primary); text-shadow: var(--glow-primary); transition: opacity 0.5s ease; }
            .subtitle { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 2px; }

            /* YENİ: Minimalist Kazıma Butonu */
            .crawl-trigger {
                width: 40px; height: 40px;
                border-radius: 50%;
                border: 1px solid var(--border);
                background: var(--bg-input);
                color: var(--primary);
                display: flex; align-items: center; justify-content: center;
                cursor: pointer; transition: 0.3s;
                box-shadow: var(--glow-primary);
                margin: 0 10px;
            }
            .crawl-trigger:hover { transform: rotate(180deg) scale(1.1); background: var(--primary); color: #000; }
            .crawl-trigger.active { color: var(--warning); border-color: var(--warning); animation: pulse 1.5s infinite; }
            @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

            #app-screen {
                display: flex; flex: 1; flex-direction: column;
                overflow-y: auto; overflow-x: hidden; padding: 20px;
                -webkit-overflow-scrolling: touch;
            }

            .search-section {
                background: var(--bg-surface); padding: 20px; border-radius: 18px;
                border: 1px solid var(--border-solid); margin-bottom: 20px;
            }
            .search-container { display: flex; gap: 10px; margin-bottom: 15px; }
            .custom-input {
                flex: 1; padding: 16px 20px; border-radius: 14px;
                border: 2px solid var(--border-solid); background: var(--bg-input);
                color: var(--primary); font-size: 18px; outline: none; transition: 0.2s;
                font-family: 'Kite One', sans-serif;
            }
            .custom-input:focus { border-color: var(--primary); box-shadow: var(--glow-primary); }
            .btn-search {
                padding: 0 30px; border-radius: 14px; background: transparent;
                color: var(--primary); font-size: 20px; border: 2px solid var(--primary);
                box-shadow: var(--glow-primary); cursor: pointer; transition: var(--transition);
                text-transform: uppercase; display: flex; align-items: center; gap: 8px;
            }

            .quick-actions-grid { 
                display: flex; gap: 15px; flex-wrap: wrap; align-items: center; 
                justify-content: space-between; background: rgba(0, 0, 0, 0.2);
                padding: 15px; border-radius: 12px; border: 1px solid var(--border-solid);
            }
            
            .left-actions { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
            .right-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

            .quick-btn {
                background: var(--bg-input); border-radius: 12px; padding: 10px 15px;
                cursor: pointer; border: 1px solid var(--border-solid);
                display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 13px;
            }

            .list-container {
                display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 20px; padding-bottom: 30px;
            }

            .record-card {
                background: var(--bg-surface); border-radius: 18px; padding: 20px;
                border: 1px solid var(--border-solid); position: relative;
                display: flex; flex-direction: column; gap: 12px; transition: var(--transition); cursor: pointer;
            }
            .record-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.6); }

            .record-card.status-kamu { border-color: rgba(0, 240, 255, 0.6); box-shadow: var(--glow-primary); }
            .record-card.status-google { border-color: rgba(251, 188, 5, 0.6); }

            .product-name {
                font-weight: 600; font-size: 15px; line-height: 1.4;
                display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            }

            .store-badge {
                font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 10px;
                text-transform: uppercase; display: flex; align-items: center; gap: 6px;
            }

            .price-area { text-align: left; margin-top: 5px; }
            .amt-paid { font-size: 28px; color: var(--success); text-shadow: 0 0 15px rgba(16,185,129,0.4); }

            .diff-container {
                display: none; margin-top: 10px; padding: 12px; border-radius: 12px;
                background: var(--bg-base); border: 1px solid var(--border-solid); font-size: 13px;
            }
            .diff-container.show { display: block; }

            .match-item {
                background: var(--bg-input); padding: 12px; border-radius: 10px;
                margin-top: 8px; border: 1px solid rgba(255,255,255,0.05);
            }

            .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: auto; padding-top: 10px;}
            .card-btn {
                padding: 12px 5px; border-radius: 10px; font-size: 14px;
                cursor: pointer; font-weight: bold; text-align: center;
                font-family: 'Bangers', cursive; letter-spacing: 1.5px;
            }
            .btn-buy { background: var(--success); color: #000; }
            .btn-save { background: var(--info); color: #fff; }
            .btn-delete { background: var(--danger); color: #fff; }

            /* TERMINAL MODAL STİLLERİ */
            .terminal-window {
                background: #000 !important; color: #00f0ff !important;
                font-family: 'Courier New', Courier, monospace !important;
                text-align: left !important; padding: 15px !important;
                max-height: 300px; overflow-y: auto; border: 1px solid #333;
                font-size: 12px !important; line-height: 1.5;
            }
            .progress-bar-container {
                width: 100%; height: 10px; background: #222;
                border-radius: 5px; margin-bottom: 10px; overflow: hidden;
            }
            .progress-bar-fill {
                height: 100%; background: var(--primary);
                width: 0%; transition: width 0.5s ease;
                box-shadow: 0 0 10px var(--primary);
            }

            #loader { display: none; flex-direction: column; justify-content: center; align-items: center; gap: 20px; padding: 60px 0; }
            .cyber-spinner {
                width: 70px; height: 70px; border: 4px solid transparent;
                border-top-color: var(--primary); border-bottom-color: var(--secondary);
                border-radius: 50%; animation: spin 1s linear infinite;
            }
            @keyframes spin { 100% { transform: rotate(360deg); } }

            @media (max-width: 768px) {
                .search-container { flex-direction: column; }
                .list-container { grid-template-columns: 1fr; }
            }
        </style>
    </head>
    <body onclick="initFullscreen()">

        <div class="app-wrapper">
            <header class="header">
                <img src="https://i.ibb.co/fYY6k2pr/KAMUSOLAR.png" alt="Kamu Solar Logo" class="header-logo" onclick="window.open('https://www.kamusolar.com/', '_blank')">
                <div class="header-title-box font-bangers">
                    <div class="dynamic-title" id="dynamicText">KAMUSOLAR</div>
                    <div class="subtitle">GÜNCEL FİYATLAR</div>
                </div>

                <!-- KAZIMA TETİKLEYİCİ BUTON -->
                <div class="crawl-trigger" id="crawlBtn" onclick="confirmCrawl()" title="Tüm Mağazaları Tara ve Listeyi Güncelle">
                    <i class="ph ph-cloud-arrow-down" style="font-size: 24px;"></i>
                </div>

                <div style="margin-left:auto; text-align:right;">
                    <div style="font-size:11px; color:var(--text-muted); font-weight:bold;">DESIGNED by</div>
                    <a href="mailto:omerzen@msn.com" style="text-decoration:none;">
                        <div style="font-size:16px; color:var(--secondary); font-weight:bold; font-family: 'Bangers', cursive; letter-spacing: 1px;">ZEN©2026</div>
                    </a>
                </div>
            </header>

            <div id="app-screen">
                <div class="search-section">
                    <div class="search-container">
                        <input type="text" id="searchInput" class="custom-input" placeholder="Ürün Adı, Marka veya Stok Kodu Yazınız..." onkeypress="if(event.key === 'Enter') ara()">
                        <button class="btn-search font-bangers" onclick="ara()">
                            <i class="ph ph-magnifying-glass"></i> ARA
                        </button>
                    </div>

                    <div class="quick-actions-grid" id="actionPanel" style="display: none;">
                        <div class="left-actions">
                            <div class="result-count-badge" style="font-family:Bangers; color:var(--success); border:1px solid var(--success); padding:5px 15px; border-radius:10px;">
                                <i class="ph ph-list-numbers"></i> <span id="resultCountText">0 Ürün</span>
                            </div>
                            <label style="display:flex; align-items:center; gap:8px; font-size:14px; font-weight:bold; cursor:pointer; color:var(--primary);">
                                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()"> Tümünü Seç
                            </label>
                            <select id="sortSelect" class="quick-btn" onchange="siralamaDegistir()">
                                <option value="fiyatArtan">Fiyat (Ucuzdan Pahalıya)</option>
                                <option value="fiyatAzalan">Fiyat (Pahalıdan Ucuza)</option>
                                <option value="magazaAdi">Mağazaya Göre (A-Z)</option>
                            </select>
                        </div>
                        <div class="right-actions">
                            <div class="quick-btn" onclick="generatePDF()"><i class="ph ph-file-pdf" style="color:var(--danger);"></i> PDF</div>
                            <div class="quick-btn" onclick="generateExcel()"><i class="ph ph-file-xls" style="color:var(--success);"></i> Excel</div>
                            <div class="quick-btn" onclick="takeScreenshot()"><i class="ph ph-image" style="color:var(--info);"></i> Resim</div>
                        </div>
                    </div>
                </div>

                <div id="loader">
                    <div class="cyber-spinner"></div>
                    <div class="font-bangers" style="color:var(--primary); font-size: 26px;">SİSTEMLER TARANIYOR...</div>
                </div>

                <div class="list-container" id="list-container"></div>
            </div>
        </div>

        <script>
            // --- KAZIMA (CRAWLER) YÖNETİMİ ---
            let crawlInterval = null;

            async function confirmCrawl() {
                actionPlaySound();
                const status = await (await fetch('/crawl-status')).json();
                
                if (status.isRunning) {
                    showCrawlProgress();
                    return;
                }

                const today = new Date().toISOString().split('T')[0];
                if (status.lastManualRunDate === today) {
                    Swal.fire({
                        title: 'BİLGİ',
                        text: 'Bugünkü tüm fiyat listesi zaten alındı. Tekrar tarama yarın yapılabilecektir.',
                        icon: 'info',
                        customClass: { popup: 'cyber-popup' }
                    });
                    return;
                }

                Swal.fire({
                    title: 'TAM TARAMA BAŞLATILSIN MI?',
                    text: 'Tüm mağazalardan stok kodları ve marka detayları dahil güncel veriler çekilecektir. Bu işlem birkaç dakika sürebilir.',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: '[ ONAYLIYORUM ]',
                    cancelButtonText: 'İPTAL',
                    customClass: { popup: 'cyber-popup' }
                }).then((result) => {
                    if (result.isConfirmed) {
                        startCrawl();
                    }
                });
            }

            async function startCrawl() {
                try {
                    const res = await fetch('/start-crawl', { method: 'POST' });
                    if (res.ok) {
                        showCrawlProgress();
                    }
                } catch (e) {
                    console.error("Crawl başlatılamadı", e);
                }
            }

            function showCrawlProgress() {
                Swal.fire({
                    title: 'MAĞAZALAR TARANIYOR...',
                    html: `
                        <div class="progress-bar-container">
                            <div id="p-bar" class="progress-bar-fill"></div>
                        </div>
                        <div id="p-terminal" class="terminal-window">Loglar hazırlanıyor...</div>
                    `,
                    showConfirmButton: false,
                    allowOutsideClick: true,
                    customClass: { popup: 'cyber-popup' },
                    didOpen: () => {
                        updateProgress();
                        crawlInterval = setInterval(updateProgress, 2000);
                    },
                    willClose: () => {
                        clearInterval(crawlInterval);
                    }
                });
            }

            async function updateProgress() {
                const status = await (await fetch('/crawl-status')).json();
                const terminal = document.getElementById('p-terminal');
                const bar = document.getElementById('p-bar');
                const btn = document.getElementById('crawlBtn');

                if (status.isRunning) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }

                if (terminal && bar) {
                    bar.style.width = status.percentage + '%';
                    terminal.innerHTML = status.progressLog.join('<br>');
                    terminal.scrollTop = terminal.scrollHeight;
                    
                    if (!status.isRunning && status.percentage === 100) {
                        terminal.innerHTML += '<br><span style="color:lime">>>> İŞLEM TAMAMLANDI. Sayfayı yenileyebilirsiniz.</span>';
                        clearInterval(crawlInterval);
                    }
                }
            }

            // Sayfa açılışında botun durumunu kontrol et
            window.onload = () => {
                fetch('/crawl-status').then(r => r.json()).then(status => {
                    if (status.isRunning) {
                        document.getElementById('crawlBtn').classList.add('active');
                    }
                });
            };

            // --- MEVCUT DİĞER FONKSİYONLARIN (ARA, PDF VB.) ---
            document.addEventListener('contextmenu', event => event.preventDefault());
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            function actionPlaySound(type = 'click') {
                if (navigator.vibrate) navigator.vibrate(20);
                if (audioCtx.state === 'suspended') audioCtx.resume();
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    if (type === 'success') { osc.frequency.setValueAtTime(600, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
                    else { osc.frequency.setValueAtTime(800, audioCtx.currentTime); gain.gain.setValueAtTime(0.05, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.05); }
                } catch (e) {}
            }

            function initFullscreen() {
                const docEl = document.documentElement;
                if (docEl.requestFullscreen) docEl.requestFullscreen().catch(() => {});
            }

            setInterval(() => {
                const dt = document.getElementById('dynamicText');
                dt.style.opacity = '0';
                setTimeout(() => {
                    dt.innerText = dt.innerText === 'KAMUSOLAR' ? 'KARAARSLAN' : 'KAMUSOLAR';
                    dt.style.opacity = '1';
                }, 500);
            }, 3000);

            function parsePrice(priceStr) {
                if (!priceStr) return 0;
                let numStr = String(priceStr).replace(/[^0-9,.]/g, '');
                let lastComma = numStr.lastIndexOf(',');
                let lastDot = numStr.lastIndexOf('.');
                if (lastComma > lastDot) return parseFloat(numStr.replace(/\./g, '').replace(',', '.'));
                return parseFloat(numStr.replace(/,/g, ''));
            }

            const formatMoney = (val) => parseFloat(val).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            function stringToColor(str) {
                let hash = 0; for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
                return `hsl(${Math.abs(hash) % 360}, 80%, 65%)`; 
            }

            let globalData = [];

            async function ara() {
                actionPlaySound();
                const query = document.getElementById('searchInput').value.trim();
                if(!query) return;
                document.getElementById('list-container').innerHTML = '';
                document.getElementById('actionPanel').style.display = 'none';
                document.getElementById('loader').style.display = 'flex';
                try {
                    const response = await fetch(`/ara?q=${encodeURIComponent(query)}`);
                    let veriler = await response.json();
                    globalData = veriler.map((v, index) => ({
                        id: index,
                        magaza: v.magaza,
                        urunAdi: v.urun_adi || v.urunAdi,
                        fiyatRaw: parsePrice(v.yeni_fiyat || v.fiyat),
                        link: v.link,
                        isKamu: v.magaza.toLowerCase().includes('kamu solar'),
                        isGoogle: v.isGoogle || false
                    })).filter(v => v.fiyatRaw > 0);
                    siralamaDegistir();
                } catch (error) {
                    Swal.fire({ title: 'Hata', text: 'Sunucuya bağlanılamadı.', icon: 'error', customClass: { popup: 'cyber-popup' } });
                } finally {
                    document.getElementById('loader').style.display = 'none';
                    if(globalData.length > 0) document.getElementById('actionPanel').style.display = 'flex';
                }
            }

            function siralamaDegistir() {
                const sortType = document.getElementById('sortSelect').value;
                globalData.sort((a, b) => {
                    if (a.isKamu && !b.isKamu) return -1;
                    if (!a.isKamu && b.isKamu) return 1;
                    if (sortType === 'fiyatArtan') return a.fiyatRaw - b.fiyatRaw;
                    if (sortType === 'fiyatAzalan') return b.fiyatRaw - a.fiyatRaw;
                    return a.magaza.localeCompare(b.magaza);
                });
                renderList();
            }

            function renderList() {
                const container = document.getElementById('list-container');
                let html = '';
                globalData.forEach(urun => {
                    const statusClass = urun.isKamu ? 'status-kamu' : (urun.isGoogle ? 'status-google' : '');
                    const badgeColor = urun.isKamu ? '#00f0ff' : (urun.isGoogle ? 'var(--google)' : stringToColor(urun.magaza));
                    html += `
                    <div class="record-card ${statusClass}" id="card-${urun.id}" onclick="kiyasla(${urun.id})">
                        <div class="checkbox-wrapper" onclick="event.stopPropagation()">
                            <input type="checkbox" class="urun-secim" value="${urun.id}" onclick="updateSelectAllState()">
                        </div>
                        <div class="card-header">
                            <div class="store-badge" style="background-color: ${badgeColor}20; color: ${badgeColor}; border:1px solid ${badgeColor}">
                                <i class="ph ph-storefront"></i> ${urun.magaza}
                            </div>
                        </div>
                        <div class="product-name selectable">${urun.urunAdi}</div>
                        <div class="price-area"><div class="amt-paid font-kite">${formatMoney(urun.fiyatRaw)} ₺</div></div>
                        <div id="diff-${urun.id}" class="diff-container"></div>
                        <div class="btn-group" onclick="event.stopPropagation()">
                            <button class="card-btn btn-buy" onclick="window.open('${urun.link}', '_blank')">GİT</button>
                            <button class="card-btn btn-save" onclick="linkKopyala('${urun.link}')">KAYDET</button>
                            <button class="card-btn btn-delete" onclick="urunSil(${urun.id})">SİL</button>
                        </div>
                    </div>`;
                });
                container.innerHTML = html || '<div style="grid-column: 1/-1; text-align:center; padding:40px;">Sonuç bulunamadı.</div>';
                document.getElementById('resultCountText').innerText = `${globalData.length} Ürün`;
            }

            function kiyasla(id) {
                actionPlaySound();
                const urun = globalData.find(u => u.id === id);
                const diffBox = document.getElementById(`diff-${id}`);
                if(diffBox.classList.contains('show')) { diffBox.classList.remove('show'); return; }
                const hedefler = urun.isKamu ? globalData.filter(u => !u.isKamu) : globalData.filter(u => u.isKamu);
                if(hedefler.length > 0) {
                    let h = hedefler[0];
                    let diff = h.fiyatRaw - urun.fiyatRaw;
                    diffBox.innerHTML = `<div>En Yakın Rakip: ${h.magaza}</div><div style="font-weight:bold; color:${diff > 0 ? 'red':'lime'}">${diff > 0 ? '+':''}${formatMoney(diff)} ₺ Fark</div>`;
                    diffBox.classList.add('show');
                }
            }

            function linkKopyala(url) { actionPlaySound('success'); navigator.clipboard.writeText(url); Swal.fire({ title: 'BAŞARILI!', text: 'Link kopyalandı.', icon: 'success', timer: 1000, showConfirmButton: false }); }
            function urunSil(id) { globalData = globalData.filter(u => u.id !== id); document.getElementById(`card-${id}`).remove(); document.getElementById('resultCountText').innerText = `${globalData.length} Ürün`; }
            function toggleSelectAll() { const isChecked = document.getElementById('selectAll').checked; document.querySelectorAll('.urun-secim').forEach(cb => cb.checked = isChecked); }
            function updateSelectAllState() { 
                const total = document.querySelectorAll('.urun-secim').length;
                const checked = document.querySelectorAll('.urun-secim:checked').length;
                document.getElementById('selectAll').checked = (total > 0 && total === checked);
            }

            async function generateExcel() {
                const workbook = new ExcelJS.Workbook(); const sheet = workbook.addWorksheet('Rapor');
                sheet.columns = [{header:'Mağaza', key:'m'}, {header:'Ürün', key:'u'}, {header:'Fiyat', key:'f'}];
                globalData.forEach(r => sheet.addRow({m:r.magaza, u:r.urunAdi, f:r.fiyatRaw}));
                const buffer = await workbook.xlsx.writeBuffer();
                saveAs(new Blob([buffer]), "Rapor.xlsx");
            }

            function generatePDF() {
                const doc = new jsPDF();
                doc.text("KAMU SOLAR RAPOR", 10, 10);
                const body = globalData.map(r => [r.magaza, r.urunAdi, formatMoney(r.fiyatRaw)]);
                doc.autoTable({ head: [['Magaza', 'Urun', 'Fiyat']], body: body });
                doc.save('Rapor.pdf');
            }

            async function takeScreenshot() {
                const canvas = await html2canvas(document.getElementById('list-container'), { backgroundColor:'#0a0f1a' });
                const link = document.createElement('a'); link.download = 'Ekran.png'; link.href = canvas.toDataURL(); link.click();
            }
        </script>
    </body>
</html>
