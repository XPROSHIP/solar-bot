        <style>
            :root {
                --bg-base: #0a0f1a;
                --bg-surface: #121a28;

                --text-main: #e2e8f0;

                --google: #fbbc05;
                --border-solid: #1e293b;
                --border: rgba(0, 240, 255, 0.2);

                --glow-secondary: 0 0 15px rgba(255, 0, 127, 0.4);
                --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }

            * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

            html, body {
                height: 100%; width: 100%; overflow: hidden;
                font-family: 'Inter', sans-serif;
                background-color: var(--bg-base);
                background-image: linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
                background-size: 30px 30px;
                color: var(--text-main); display: flex; justify-content: center; user-select: none;
            }
            input, textarea, .selectable { user-select: auto; }

            ::-webkit-scrollbar { width: 6px; }
            ::-webkit-scrollbar-track { background: var(--bg-base); }
            ::-webkit-scrollbar-thumb { background: var(--border-solid); border-radius: 10px; }
            ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

            .app-wrapper {
                width: 100%; max-width: 1200px; height: 100%;
                display: flex; flex-direction: column;
                background-color: rgba(10, 15, 26, 0.95);
                backdrop-filter: blur(10px);
                box-shadow: 0 0 50px rgba(0,0,0,1);
                border-left: 1px solid var(--border-solid);
                border-right: 1px solid var(--border-solid);
                position: relative;
            }

            .font-bangers { font-family: 'Bangers', cursive; letter-spacing: 1.5px; }
            .font-kite { font-family: 'Kite One', sans-serif; }

            .header {
                padding: 15px 20px; display: flex; align-items: center; gap: 15px;
                background: rgba(18, 26, 40, 0.95); backdrop-filter: blur(15px);
                border-bottom: 1px solid var(--border-solid); z-index: 100; flex-shrink: 0;
            }
            .header-logo {
                width: 50px; height: 50px; cursor: pointer; object-fit: contain;
                filter: drop-shadow(var(--glow-primary)); transition: transform 0.2s;
            }
            .header-logo:hover { transform: scale(1.1); }
            .header-title-box { display: flex; flex-direction: column; justify-content: center; flex: 1; cursor: pointer; }
            .dynamic-title { font-size: 26px; color: var(--primary); text-shadow: var(--glow-primary); transition: opacity 0.5s ease; }
            .subtitle { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 2px; }

            /* HİBRİT: Crawler Tetikleyici */
            .crawl-trigger {
                width: 42px; height: 42px; border-radius: 12px;

            .crawl-trigger.active { color: var(--warning); border-color: var(--warning); animation: pulse 1.5s infinite; }
            @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

            #app-screen {
                display: flex; flex: 1; flex-direction: column;

                flex: 1; padding: 16px 20px; border-radius: 14px;

            .quick-btn {

            .result-count-badge {

            .list-container {

            .match-item {
                background: var(--bg-input); padding: 12px; border-radius: 10px; margin-top: 8px;

                display: flex; flex-direction: column; gap: 6px;
            }
            .diff-badge { padding: 4px 8px; border-radius: 6px; font-family: 'Kite One', sans-serif; font-size: 14px; font-weight: bold; }
            .diff-cheap { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid var(--success); }
            .diff-expensive { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid var(--danger); }
            .diff-neutral { background: rgba(0,240,255,0.15); color: var(--primary); border: 1px solid var(--primary); }

            .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: auto; padding-top: 10px;}
            .card-btn {
                padding: 12px 5px; border-radius: 10px; font-size: 14px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s;
                text-align: center; font-family: 'Bangers', cursive; letter-spacing: 1.5px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            }
            .btn-buy { background: var(--success); color: #000; }
            .btn-save { background: var(--info); color: #fff; }
            .btn-delete { background: var(--danger); color: #fff; }

            /* HİBRİT: Terminal & Bar */
            .terminal-window {
                background: #000 !important; color: #00f0ff !important;
                font-family: 'Courier New', Courier, monospace !important;
                text-align: left !important; padding: 15px !important;
                max-height: 250px; overflow-y: auto; border: 1px solid #333;
                font-size: 11px !important; line-height: 1.4; border-radius: 8px;
            }
            .p-bar-container { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-bottom: 12px; overflow: hidden; }
            .p-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; box-shadow: 0 0 10px var(--primary); }

            #loader { display: none; flex-direction: column; justify-content: center; align-items: center; gap: 20px; padding: 60px 0; }
            .cyber-spinner {
                width: 70px; height: 70px; border: 4px solid transparent; border-top-color: var(--primary);
                border-bottom-color: var(--secondary); border-radius: 50%; animation: spin 1s linear infinite;
            }
            @keyframes spin { 100% { transform: rotate(360deg); } }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

            .cyber-popup { border-radius: 24px !important; background: var(--bg-surface) !important; color: var(--text-main) !important; border: 1px solid var(--primary) !important; }

            @media (max-width: 768px) {
                .search-container { flex-direction: column; }
                .list-container { grid-template-columns: 1fr; }
                .quick-actions-grid { flex-direction: column; align-items: stretch; }

            </header>

            <div id="app-screen">
                <div class="search-section">
                    <div class="search-container">

                            </label>

                                <option value="fiyatArtan">Fiyat (Ucuzdan Pahalıya)</option>

                <div id="loader">
                    <div class="cyber-spinner"></div>

        <script>
            // --- HİBRİT: CRAWLER KONTROL ---
            let crawlInterval = null;
            async function confirmCrawl() {
                actionPlaySound();
                const status = await (await fetch('/crawl-status')).json();
                if (status.isRunning) { showCrawlProgress(); return; }
                const today = new Date().toISOString().split('T')[0];
                if (status.lastManualRunDate === today) {
                    Swal.fire({ title: 'BİLGİ', text: 'Bugünkü tüm fiyatlar zaten alındı. Yeni tarama yarın yapılabilecektir.', icon: 'info', customClass: { popup: 'cyber-popup' } });
                    return;
                }
                Swal.fire({
                    title: 'TAM TARAMA BAŞLATILSIN MI?',
                    text: 'Tüm mağazalardan stok kodları ve marka detayları dahil güncel veriler çekilecektir.',
                    icon: 'question', showCancelButton: true, confirmButtonText: '[ ONAYLIYORUM ]', cancelButtonText: 'İPTAL', customClass: { popup: 'cyber-popup' }
                }).then((r) => { if (r.isConfirmed) startCrawl(); });
            }
            async function startCrawl() {
                const res = await fetch('/start-crawl', { method: 'POST' });
                if (res.ok) showCrawlProgress();
            }
            function showCrawlProgress() {
                Swal.fire({
                    title: 'MAĞAZALAR TARANIYOR...',
                    html: `<div class="p-bar-container"><div id="p-bar" class="p-bar-fill"></div></div><div id="p-terminal" class="terminal-window">Bağlanılıyor...</div>`,
                    showConfirmButton: false, allowOutsideClick: true, customClass: { popup: 'cyber-popup' },
                    didOpen: () => { updateProgress(); crawlInterval = setInterval(updateProgress, 2000); },
                    willClose: () => { clearInterval(crawlInterval); }
                });
            }
            async function updateProgress() {
                const status = await (await fetch('/crawl-status')).json();
                const term = document.getElementById('p-terminal');
                const bar = document.getElementById('p-bar');
                const btn = document.getElementById('crawlBtn');
                if(status.isRunning) btn.classList.add('active'); else btn.classList.remove('active');
                if(term && bar) {
                    bar.style.width = status.percentage + '%';
                    term.innerHTML = status.progressLog.join('<br>');
                    term.scrollTop = term.scrollHeight;
                    if(!status.isRunning && status.percentage === 100) term.innerHTML += '<br><span style="color:lime">>>> İŞLEM TAMAMLANDI.</span>';
                }
            }

            // --- ORİJİNAL v4 FONKSİYONLARININ TAMAMI ---
            document.addEventListener('contextmenu', event => event.preventDefault());
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            function actionPlaySound(type = 'click') {
                if (navigator.vibrate) navigator.vibrate(20);
                if (audioCtx.state === 'suspended') audioCtx.resume();
                try {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    if (type === 'success') { osc.frequency.setValueAtTime(600, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
                    else { osc.frequency.setValueAtTime(800, audioCtx.currentTime); gain.gain.setValueAtTime(0.05, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.05); }
                } catch (e) {}
            }
            let isFullscreen = false;
            function initFullscreen() {
                if (!isFullscreen) { const docEl = document.documentElement; if (docEl.requestFullscreen) docEl.requestFullscreen().catch(()=>{}); isFullscreen = true; }
            }
            setInterval(() => {
                const dt = document.getElementById('dynamicText'); dt.style.opacity = '0';
                setTimeout(() => { dt.innerText = dt.innerText === 'KAMUSOLAR' ? 'KARAARSLAN' : 'KAMUSOLAR'; dt.style.opacity = '1'; }, 500);
            }, 3000);

            // Gelişmiş Fiyat Çözücü
            function parsePrice(priceStr) {
                if (!priceStr) return 0;
                let parts = String(priceStr).split(/[\s\n]+/);
                let prices = [];
                for(let p of parts) {
                    let numStr = p.replace(/[^0-9,.]/g, ''); if(!numStr) continue;
                    let lastComma = numStr.lastIndexOf(','); let lastDot = numStr.lastIndexOf('.');
                    let val = 0;
                    if (lastComma > lastDot) val = parseFloat(numStr.replace(/\./g, '').replace(',', '.'));
                    else if (lastDot > lastComma) val = parseFloat(numStr.replace(/,/g, ''));
                    else val = parseFloat(numStr.replace(',', '.'));
                    if(val && !isNaN(val)) prices.push(val);
                }
                return prices.length > 0 ? Math.min(...prices) : 0;
            }

            const formatMoney = (val) => parseFloat(val).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            function stringToColor(str) {
                let hash = 0; for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
                return `hsl(${Math.abs(hash) % 360}, 80%, 65%)`; 
            }

            let globalData = [];

            async function ara() {
                actionPlaySound();
                const query = document.getElementById('searchInput').value.trim();
                if(!query) return;
                document.getElementById('list-container').innerHTML = '';
                document.getElementById('actionPanel').style.display = 'none';
                document.getElementById('loader').style.display = 'flex';
                try {
                    const response = await fetch(`/ara?q=${encodeURIComponent(query)}`);
                    let veriler = await response.json();
                    let islenmis = veriler.map((v, index) => ({
                        id: index, magaza: v.magaza, urunAdi: v.urun_adi || v.urunAdi,
                        fiyatRaw: parsePrice(v.yeni_fiyat || v.fiyat), link: v.link,
                        isKamu: v.magaza.toLowerCase().includes('kamu solar'), isGoogle: v.isGoogle || false
                    })).filter(v => v.fiyatRaw > 0);

                    // Orijinal Medyan Filtresi
                    if(islenmis.length > 3) {
                        const fiyatlar = islenmis.map(v => v.fiyatRaw).sort((a,b) => a-b);
                        const medyan = fiyatlar[Math.floor(fiyatlar.length / 2)];
                        islenmis = islenmis.filter(v => v.fiyatRaw >= (medyan * 0.25) && v.fiyatRaw <= (medyan * 3.0));
                    }
                    globalData = islenmis; siralamaDegistir();
                } catch (e) {
                    Swal.fire({ title: 'Hata', text: 'Sunucuya bağlanılamadı.', icon: 'error', customClass: { popup: 'cyber-popup' } });
                } finally {
                    document.getElementById('loader').style.display = 'none';
                    if(globalData.length > 0) document.getElementById('actionPanel').style.display = 'flex';
                }
            }

            function siralamaDegistir() {
                const sortType = document.getElementById('sortSelect').value;
                globalData.sort((a, b) => {
                    if (a.isKamu && !b.isKamu) return -1;
                    if (!a.isKamu && b.isKamu) return 1;
                    if (sortType === 'fiyatArtan') return a.fiyatRaw - b.fiyatRaw;
                    if (sortType === 'fiyatAzalan') return b.fiyatRaw - a.fiyatRaw;
                    return a.magaza.localeCompare(b.magaza);
                });
                renderList();
            }

            function renderList() {
                const container = document.getElementById('list-container');
                let html = '';
                globalData.forEach(urun => {
                    const statusClass = urun.isKamu ? 'status-kamu' : (urun.isGoogle ? 'status-google' : '');
                    const badgeColor = urun.isKamu ? '#00f0ff' : (urun.isGoogle ? 'var(--google)' : stringToColor(urun.magaza));
                    html += `
                    <div class="record-card ${statusClass}" id="card-${urun.id}" onclick="kiyasla(${urun.id})">
                        <div class="checkbox-wrapper" onclick="event.stopPropagation()">
                            <input type="checkbox" class="urun-secim" value="${urun.id}" onclick="updateSelectAllState()">
                        </div>
                        <div class="card-header">
                            <div class="store-badge" style="background-color:${badgeColor}20; color:${badgeColor}; border:1px solid ${badgeColor}">
                                <i class="ph ph-storefront"></i> ${urun.magaza}
                            </div>
                        </div>
                        <div class="product-name selectable">${urun.urunAdi}</div>
                        <div class="price-area"><div class="amt-paid font-kite">${formatMoney(urun.fiyatRaw)} ₺</div></div>
                        <div id="diff-${urun.id}" class="diff-container"></div>
                        <div class="btn-group" onclick="event.stopPropagation()">
                            <button class="card-btn btn-buy" onclick="window.open('${urun.link}', '_blank')">GİT</button>
                            <button class="card-btn btn-save" onclick="linkKopyala('${urun.link}')">KAYDET</button>
                            <button class="card-btn btn-delete" onclick="urunSil(${urun.id})">SİL</button>
                        </div>
                    </div>`;
                });
                container.innerHTML = html || '<div style="grid-column:1/-1; text-align:center; padding:40px;">Sonuç bulunamadı.</div>';
                document.getElementById('resultCountText').innerText = `${globalData.length} Ürün`;
            }

            // Orijinal Gelişmiş Kıyaslama Mantığı
            function calculateSimilarity(u1, u2) {
                let score = 0; const getSpecs = n => (n.match(/\b\d+(w|kw|v|ah|a)?\b/gi) || []).map(m => m.toLowerCase());
                const s1 = getSpecs(u1.urunAdi); const s2 = getSpecs(u2.urunAdi);
                s1.forEach(s => { if(s2.includes(s)) score += 15; });
                const w1 = u1.urunAdi.toLowerCase().split(/\s+/); const w2 = u2.urunAdi.toLowerCase().split(/\s+/);
                score += (w1.filter(w => w.length > 2 && w2.includes(w)).length * 5);
                const ratio = Math.min(u1.fiyatRaw, u2.fiyatRaw) / Math.max(u1.fiyatRaw, u2.fiyatRaw);
                if (ratio > 0.85) score += 20; return score;
            }

            function kiyasla(id) {
                actionPlaySound(); const urun = globalData.find(u => u.id === id);
                const diffBox = document.getElementById(`diff-${id}`);
                if(diffBox.classList.contains('show')) { diffBox.classList.remove('show'); return; }
                const hedefler = urun.isKamu ? globalData.filter(u => !u.isKamu) : globalData.filter(u => u.isKamu);
                let scored = hedefler.map(h => ({ target: h, score: calculateSimilarity(urun, h) })).filter(st => st.score > 10).sort((a,b) => b.score - a.score).slice(0,3);
                if(scored.length > 0) {
                    let htm = `<div style="font-weight:bold; margin-bottom:8px; border-bottom:1px solid #333;">Alternatifler:</div>`;
                    scored.forEach(s => {
                        const h = s.target; const diff = h.fiyatRaw - urun.fiyatRaw;
                        htm += `<div class="match-item" onclick="event.stopPropagation(); window.open('${h.link}','_blank')">
                            <div style="display:flex; justify-content:space-between; font-size:11px;">
                                <span style="color:${stringToColor(h.magaza)}">${h.magaza}</span>
                                <span class="diff-badge ${diff > 0 ? 'diff-expensive':'diff-cheap'}">${diff > 0 ? '+':''}${formatMoney(diff)} ₺</span>
                            </div>
                            <div style="font-size:10px; color:var(--text-muted);">${h.urunAdi}</div>
                        </div>`;
                    });
                    diffBox.innerHTML = htm; diffBox.classList.add('show');
                }
            }

            function linkKopyala(url) { actionPlaySound('success'); navigator.clipboard.writeText(url); Swal.fire({ title:'Kopyalandı', icon:'success', timer:800, showConfirmButton:false }); }
            function urunSil(id) { globalData = globalData.filter(u => u.id !== id); document.getElementById(`card-${id}`).remove(); document.getElementById('resultCountText').innerText = `${globalData.length} Ürün`; }
            function toggleSelectAll() { const is = document.getElementById('selectAll').checked; document.querySelectorAll('.urun-secim').forEach(c => c.checked = is); }
            function updateSelectAllState() { const t = document.querySelectorAll('.urun-secim').length; const c = document.querySelectorAll('.urun-secim:checked').length; document.getElementById('selectAll').checked = (t > 0 && t === c); }

            async function generateExcel() {
                const workbook = new ExcelJS.Workbook(); const sheet = workbook.addWorksheet('Rapor');
                sheet.columns = [{header:'Mağaza', key:'m', width:20}, {header:'Ürün', key:'u', width:50}, {header:'Fiyat', key:'f', width:15}];
                globalData.forEach(r => sheet.addRow({m:r.magaza, u:r.urunAdi, f:r.fiyatRaw}));
                const b = await workbook.xlsx.writeBuffer(); saveAs(new Blob([b]), "Analiz.xlsx");
            }
            function generatePDF() {
                const doc = new jsPDF(); doc.text("KAMU SOLAR ANALIZ", 14, 10);
                const body = globalData.map(r => [r.magaza, r.urunAdi, formatMoney(r.fiyatRaw) + ' TL']);
                doc.autoTable({ head:[['Magaza','Urun','Fiyat']], body: body }); doc.save('Analiz.pdf');
            }
            async function takeScreenshot() {
                const canvas = await html2canvas(document.getElementById('list-container'), { backgroundColor:'#0a0f1a' });
                const l = document.createElement('a'); l.download='Ekran.png'; l.href=canvas.toDataURL(); l.click();
            }
        </script>
        
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').catch(()=>{}); });
            }
        </script>
    </body>
</html>
